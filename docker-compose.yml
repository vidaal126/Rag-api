services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: rag-api2-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRESQL_USER:-postgres}:${POSTGRESQL_PASSWORD:-postgres}@postgres:5432/${POSTGRESQL_NAME:-rag_api2}
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
      - /app/src/infrastructure/database/prisma/generated
    networks:
      - rag-api2-network

  postgres:
    image: pgvector/pgvector:pg17
    container_name: rag-api2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRESQL_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRESQL_NAME:-rag_api2}
    ports:
      - "${POSTGRESQL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-api2-network

volumes:
  postgres_data:
    driver: local

networks:
  rag-api2-network:
    driver: bridge
